services:
  bridge:
    build:
      context: C:/Users/wisru/line-dify-bridge
      dockerfile: Dockerfile
    image: hospital-bridge:dev
    container_name: hospital-bridge
    restart: always
    env_file:
      - C:/Users/wisru/line-dify-bridge/.env
    environment:
      DB_HOST: db_postgres
      DB_PORT: 5432
      DIFY_API_URL: http://api:5001/v1
      NGROK_PUBLIC_URL: ${NGROK_PUBLIC_URL:-https://bridge.bbh-hospital.com}
      N8N_INTERNAL_BASE_URL: ${N8N_INTERNAL_BASE_URL:-http://hospital-n8n:5678}
      GOOGLE_SERVICE_ACCOUNT_FILE: /app/credentials/service_account.json
    volumes:
      - C:/Users/wisru/line-dify-bridge/credentials:/app/credentials:ro
    ports:
      - "8000:8000"
    networks:
      - dify_default

networks:
  dify_default:
    name: docker_default
    external: true
