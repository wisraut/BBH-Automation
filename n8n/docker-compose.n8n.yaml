services:
  n8n:
    image: n8nio/n8n:latest
    container_name: hospital-n8n
    restart: unless-stopped
    # All secrets/config live in .env.n8n. Only static overrides remain here.
    env_file:
      - .env.n8n
    environment:
      GENERIC_TIMEZONE: Asia/Bangkok
      WEBHOOK_URL: https://n8n.bbh-hospital.com
      NODE_FUNCTION_ALLOW_EXTERNAL: "*"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - hospital_n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
    networks:
      - dify_default

  bot-ops-db:
    image: mysql:8.4
    container_name: hospital-bot-ops-db
    restart: unless-stopped
    env_file:
      - .env.n8n
    environment:
      MYSQL_ROOT_PASSWORD: ${BOT_OPS_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${BOT_OPS_DB_NAME:-bbh_bot_ops}
      MYSQL_USER: ${BOT_OPS_DB_USER:-bbh_bot}
      MYSQL_PASSWORD: ${BOT_OPS_DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+07:00
    ports:
      - "${BOT_OPS_DB_PORT_HOST:-3307}:3306"
    volumes:
      - hospital_bot_ops_mysql:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - dify_default


volumes:
  hospital_n8n_data:
  hospital_bot_ops_mysql:

networks:
  dify_default:
    name: docker_default
    external: true
