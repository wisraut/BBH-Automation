services:
  n8n:
    image: n8nio/n8n:latest
    container_name: hospital-n8n
    restart: unless-stopped
    environment:
      GENERIC_TIMEZONE: ${TZ:-Asia/Bangkok}
      TZ: ${TZ:-Asia/Bangkok}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_LICENSE_ACTIVATION_KEY: ${N8N_LICENSE_ACTIVATION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      BRIDGE_INTERNAL_URL: ${BRIDGE_INTERNAL_URL:-http://hospital-bridge:8000}
      BRIDGE_INTERNAL_TOKEN: ${BRIDGE_INTERNAL_TOKEN}
      # LINE credentials (used inside Code nodes via process.env)
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      LINE_CRO_CHANNEL_ID: ${LINE_CRO_CHANNEL_ID}
      LINE_CRO_CHANNEL_SECRET: ${LINE_CRO_CHANNEL_SECRET}
      # Dify
      DIFY_API_URL: ${DIFY_API_URL:-http://nginx/v1}
      DIFY_API_KEY: ${DIFY_API_KEY}
      # Bot Ops DB (business state for booking/dashboard, separate from hospital DB)
      BOT_OPS_DB_HOST: ${BOT_OPS_DB_HOST:-bot-ops-db}
      BOT_OPS_DB_PORT: ${BOT_OPS_DB_PORT:-3306}
      BOT_OPS_DB_NAME: ${BOT_OPS_DB_NAME:-bbh_bot_ops}
      BOT_OPS_DB_USER: ${BOT_OPS_DB_USER:-bbh_bot}
      BOT_OPS_DB_PASSWORD: ${BOT_OPS_DB_PASSWORD}
      NODE_FUNCTION_ALLOW_EXTERNAL: "*"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_RUNNERS_ENABLED: "false"
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - hospital_n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
    networks:
      - dify_default

  bot-ops-db:
    image: mysql:8.4
    container_name: hospital-bot-ops-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${BOT_OPS_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${BOT_OPS_DB_NAME:-bbh_bot_ops}
      MYSQL_USER: ${BOT_OPS_DB_USER:-bbh_bot}
      MYSQL_PASSWORD: ${BOT_OPS_DB_PASSWORD}
      TZ: ${TZ:-Asia/Bangkok}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+07:00
    ports:
      - "${BOT_OPS_DB_PORT_HOST:-3307}:3306"
    volumes:
      - hospital_bot_ops_mysql:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - dify_default


volumes:
  hospital_n8n_data:
  hospital_bot_ops_mysql:

networks:
  dify_default:
    name: docker_default
    external: true
